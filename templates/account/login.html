{% extends "account/base.html" %}

{% load i18n %}
{% load account %}
{% load crispy_forms_tags %}

{% block inner_content %}

<div class="container-fluid p-0">
    <div class="row p-0 mx-0 g-4">
        <div class="col-12 p-0 mx-0">
     
 <section class="page-bg hero-img-bg">

    <div class="overlay-main"></div>
        
         <div class="content-wrapper">
            <div class="card shadow-md border-0 p-4 auth-card">

                <h2 class="text-center mb-4 font-2">Sign In</h2>

                <form method="POST" action="{% url 'account_login' %}">

                    {% csrf_token %}
                    {{ form|crispy }}

                    
                    <button class="btn btn-styling1 w-50 mt-3" type="submit">
                        Sign In
                    </button>

                </form>

                <div class="text-center mt-3">
                    <small class="d-block">
                        Don't have an account?
                        <a class="btn loging-signup font-dark-purple d-block p-0" href="{% url 'account_signup' %}">
                            Create one here
                        </a>
                    </small>
                </div>

            </div>
        </div>


        </section>
    </div>
  </div>
</div>



{% endblock %}
