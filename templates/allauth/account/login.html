{% extends "allauth/account/base.html" %}

{% load i18n %}
{% load account %}

{% block inner_content %}





        
 <section class="page-bg join-team-bg">
    <div class="overlay-main"></div>
        
         <div class="content-wrapper">
            <div class="card shadow-md border-0 p-4 auth-card">

                <h2 class="text-center mb-4">Sign In</h2>

                <form method="POST" action="{% url 'account_login' %}">

                    {% csrf_token %}

                    {% for field in form %}
                        <div class="mb-3">

                            <label class="form-label">
                                {{ field.label }}
                            </label>

                            {{ field }}

                            {% if field.errors %}
                                <div class="text-danger small mt-1">
                                    {{ field.errors }}
                                </div>
                            {% endif %}

                        </div>
                    {% endfor %}

                    <button class="btn btn-styling w-50 mt-3" type="submit">
                        Sign In
                    </button>

                </form>

                <div class="text-center mt-3">
                    <small>
                        Don't have an account?
                        <a class="btn-account w-50" href="{% url 'account_signup' %}">
                            Sign Up
                        </a>
                    </small>
                </div>

            </div>

        </div>
    </div>
</div>

{% endblock %}
