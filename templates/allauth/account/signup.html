{% extends "allauth/account/base.html" %}

{% load i18n %}
{% load account %}

{% block inner_content %}





        
 <section class="page-bg join-team-bg">
    <div class="overlay-main"></div>
        
         <div class="content-wrapper">






<div class="col-12">
            <div class="card shadow-lg border-0 p-4 auth-card">

                <h2 class="text-center mb-4">Create Account</h2>

                <form method="POST" action="{% url 'account_signup' %}">

                    {% csrf_token %}
                    {{ form|crispy }}


                    <button class="btn btn-styling w-50 mt-3" type="submit">
                        Sign Up
                    </button>

                </form>

                <div class="text-center mt-3">
                    <small>
                        Already have an account?
                        <a class="btn-account" href="{% url 'account_login' %}">
                            Sign In
                        </a>
                    </small>
                </div>
            </div>
        </div>


    </div>
  
</section>



 

{% endblock %}
