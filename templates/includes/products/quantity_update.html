<script type="text/javascript">
    // Disable +/- buttons outside 1-99 range
    function handleEnableDisable(itemId) {
        const currentValue = parseInt($(`#id_qty_${itemId}`).val());
        const minusDisabled = currentValue < 2;
        const plusDisabled = currentValue > 98;
        $(`#decrement-qty_${itemId}`).prop('disabled', minusDisabled);
        $(`#increment-qty_${itemId}`).prop('disabled', plusDisabled);
    }

    // Ensure proper enabling/disabling of all inputs on page load
    var allQtyInputs = $('.qty_input');
    for(let i = 0; i < allQtyInputs.length; i++){
        const itemId = $(allQtyInputs[i]).data('item_id');
        handleEnableDisable(itemId);
    }

    // Check enable/disable every time the input is changed
    $('.qty_input').change(function() {
        const itemId = $(this).data('item_id');
        handleEnableDisable(itemId);
    });

    // Increment quantity
    $('.increment-qty').click(function(e) {
       e.preventDefault();
       const closestInput = $(this).closest('.input-group').find('.qty_input')[0];
       const currentValue = parseInt($(closestInput).val());
       $(closestInput).val(currentValue + 1);
       const itemId = $(this).data('item_id');
       handleEnableDisable(itemId);
    });
    
    // Decrement quantity
    $('.decrement-qty').click(function(e) {
       e.preventDefault();
       const closestInput = $(this).closest('.input-group').find('.qty_input')[0];
       const currentValue = parseInt($(closestInput).val());
       $(closestInput).val(currentValue - 1);
       const itemId = $(this).data('item_id');
       handleEnableDisable(itemId);
    });

    // Update quantity on click
    $('.update-link').click(function(e) {
        const form = $(this).prev('.update-form');
        form.submit();
    })

    // Remove item and reload on click
    $(document).on('click', '.remove-item', function(e) {
    e.preventDefault();

    const csrfToken = "{{ csrf_token }}";   // must render in template
    const itemId = $(this).attr('id').split('remove_')[1]; // get numeric id
    const url = `/cart/remove/${itemId}/`;  // matches Django url pattern

    $.ajax({
        url: url,
        type: 'POST',
        data: { 'csrfmiddlewaretoken': csrfToken },
        success: function() {
            location.reload();  // or you can remove the row manually for smooth UX
        },
        error: function() {
            alert('Could not remove item from cart.');
        }
    });
});

</script>
