{% extends "base.html" %}

{% block content %}
<div class="container-fluid p-0">
    <div class="row mx-0">
        <div class="col-12 p-0">

            <section class="page-bg join-team-bg">
                <div class="overlay-main"></div>

                <div class="content-wrapper ">

                    <div class="container-fluid">

                        <h2 class="logo-font text-center mb-5">SHOP</h2>
                      

                        <div class="row bg2-color pt-3">

                            {% for product in products %}
                            <div class="col-6 col-sm-6 col-md-4 col-lg-3 mb-3 ">

                                <div class="card h-100 border-0 secondary-color">

                                    {% if product.image %}
                                    <a href="{% url 'products:product_details' product.id %}">
                                        <img class="card-img-top img-fluid"
                                             src="{{ product.image.url }}"
                                             alt="{{ product.name }}">
                                    </a>
                                    {% else %}
                                    <a href="{% url 'products:product_details' product.id %}">
                                        <img class="card-img-top img-fluid"
                                             src="{{ MEDIA_URL }}noimage.png"
                                             alt="{{ product.name }}">
                                    </a>
                                    {% endif %}

                                    <div class="card-body text-center">
                                        <p class="mb-2 fs-5">{{ product.name }}</p>
                                        <p class="font-weight-bold mb-0 font-2">
                                            £{{ product.price }}
                                        </p>
                                    </div>

                                </div>

                            </div>
                            {% endfor %}

                        </div>

                    </div>

                </div>
            </section>

        </div>
    </div>
</div>
{% endblock %}
