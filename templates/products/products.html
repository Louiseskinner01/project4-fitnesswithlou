{% extends "base.html" %}

{% block content %}

<h1>Products Page</h1>

{% if products %}
    <ul>
        {% for product in products %}
            <li>
                <strong>{{ product.name }}</strong> - £{{ product.price }}
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No products available yet.</p>
{% endif %}


{% endblock %}
