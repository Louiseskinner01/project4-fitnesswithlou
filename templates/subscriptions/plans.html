{% extends "base.html" %}

{% block content %}

<div class="container">
    <h1 class="text-center mb-4">Choose Your Membership</h1>
    <div class="row">
        
        {% for plan in plans %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                <div class="card-body text-center">
                    <!-- Plan Name -->
                    <h3 class="card-title">
                        {{ plan.get_name_display }}
                    </h3>
                    <!-- Price -->
                    <h4 class="text-primary">
                        £{{ plan.price }}
                        <small class="text-muted">
                            / {{ plan.billing_cycle }}
                        </small>
                    </h4>
                    <!-- Description -->
                    <p class="mt-3">
                        {{ plan.description }}
                    </p>
                </div>

                <div class="card-footer text-center">
                    <a href="{% url 'subscriptions:subscribe' plan.id %}" 
                       class="btn btn-success">
                        Subscribe
                    </a>
                </div>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

{% endblock %}
